<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>打地鼠 - 手指训练游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
        }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        /* 顶部标题栏 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 15px;
            flex-shrink: 0;
        }

        h1 {
            color: #fff;
            font-size: 1.4rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .score-box {
            background: rgba(255,255,255,0.95);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .score-box span {
            color: #ff6b6b;
            font-weight: bold;
            font-size: 1.3rem;
        }

        /* 中间游戏区域 */
        .game-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
        }

        .game-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            background: rgba(255,255,255,0.9);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1;
        }

        .hole {
            aspect-ratio: 1;
            width: 100%;
            background: radial-gradient(ellipse at center, #4a2c2a 0%, #2d1810 100%);
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            border: 5px solid #8b5a2b;
            box-shadow: inset 0 10px 18px rgba(0,0,0,0.5);
            transition: transform 0.08s;
        }

        .hole:active {
            transform: scale(0.92);
        }

        .mole {
            width: 75%;
            height: 75%;
            position: absolute;
            bottom: -90%;
            left: 12.5%;
            transition: bottom 0.15s ease-out;
            pointer-events: none;
        }

        .mole::before {
            content: "🐹";
            font-size: clamp(32px, 9vw, 55px);
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        .hole.up .mole {
            bottom: 8%;
        }

        /* 底部控制栏 */
        .footer {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 12px;
            flex-shrink: 0;
        }

        .start-btn {
            padding: 12px 50px;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 18px rgba(238,90,36,0.4);
            transition: all 0.2s;
            font-weight: bold;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(238,90,36,0.5);
        }

        .start-btn:active {
            transform: scale(0.95);
        }

        .start-btn:disabled {
            background: #999;
            cursor: not-allowed;
            transform: none;
        }

        .time-display {
            color: #fff;
            font-size: 1rem;
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 15px;
        }

        /* 特效 */
        .hit-effect {
            position: fixed;
            font-size: 2.5rem;
            animation: hitPop 0.4s ease-out forwards;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes hitPop {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }

        .encourage {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 0 #ff6b6b;
            animation: popIn 0.8s ease-out forwards;
            z-index: 101;
            pointer-events: none;
            text-align: center;
            white-space: nowrap;
        }

        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        .star {
            position: fixed;
            font-size: 1.5rem;
            pointer-events: none;
            animation: starFly 0.8s ease-out forwards;
            z-index: 99;
        }

        @keyframes starFly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        * {
            -webkit-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎯 打地鼠</h1>
        <div class="score-box">得分: <span id="score">0</span></div>
    </div>

    <div class="game-area">
        <div class="game-container">
            <div class="hole"><div class="mole"></div></div>
            <div class="hole"><div class="mole"></div></div>
            <div class="hole"><div class="mole"></div></div>
            <div class="hole"><div class="mole"></div></div>
            <div class="hole"><div class="mole"></div></div>
            <div class="hole"><div class="mole"></div></div>
            <div class="hole"><div class="mole"></div></div>
            <div class="hole"><div class="mole"></div></div>
            <div class="hole"><div class="mole"></div></div>
        </div>
    </div>

    <div class="footer">
        <button class="start-btn" id="startBtn" onclick="startGame()">开始</button>
        <div class="time-display" id="timeDisplay">30秒</div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playPopSound() {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(280, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.12);
                gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.12);
            } catch(e) {}
        }
        
        function playHitSound() {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'square';
                osc.frequency.setValueAtTime(350, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.35, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);
            } catch(e) {}
        }

        const holes = document.querySelectorAll('.hole');
        const scoreDisplay = document.getElementById('score');
        const startBtn = document.getElementById('startBtn');
        const timeDisplay = document.getElementById('timeDisplay');
        
        let score = 0, lastHole, timeUp = false, gameTime = 30, timer;
        const encourages = ["太棒了!", "好样的!", "厉害!", "真棒!", "不错!"];

        function randomTime(min, max) {
            return Math.round(Math.random() * (max - min) + min);
        }

        function randomHole(holes) {
            const idx = Math.floor(Math.random() * holes.length);
            const hole = holes[idx];
            if (hole === lastHole) return randomHole(holes);
            lastHole = hole;
            return hole;
        }

        function peep() {
            const time = randomTime(500, 1100);
            const hole = randomHole(holes);
            hole.classList.add('up');
            playPopSound();
            
            setTimeout(() => {
                hole.classList.remove('up');
                if (!timeUp) peep();
            }, time);
        }

        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            score = 0;
            timeUp = false;
            gameTime = 30;
            scoreDisplay.textContent = score;
            startBtn.disabled = true;
            startBtn.textContent = "游戏中";
            timeDisplay.textContent = "30秒";
            
            peep();
            
            timer = setInterval(() => {
                gameTime--;
                timeDisplay.textContent = gameTime + "秒";
                if (gameTime <= 0) {
                    clearInterval(timer);
                    timeUp = true;
                    startBtn.disabled = false;
                    startBtn.textContent = "再来";
                    timeDisplay.textContent = "结束!";
                    showResult();
                }
            }, 1000);
        }

        function whack(e) {
            if(!e.isTrusted) return;
            const hole = this;
            if (!hole.classList.contains('up')) return;
            
            playHitSound();
            score++;
            hole.classList.remove('up');
            scoreDisplay.textContent = score;
            
            let x, y;
            if (e.touches) { x = e.touches[0].clientX; y = e.touches[0].clientY; }
            else { x = e.clientX; y = e.clientY; }
            
            showHit(x, y);
            showEncourage();
            createStars(x, y);
        }

        function showHit(x, y) {
            const el = document.createElement('div');
            el.className = 'hit-effect';
            el.textContent = '💥';
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 400);
        }

        function showEncourage() {
            const el = document.createElement('div');
            el.className = 'encourage';
            el.textContent = encourages[Math.floor(Math.random() * encourages.length)];
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        function createStars(x, y) {
            for (let i = 0; i < 5; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.textContent = '⭐';
                star.style.left = x + 'px';
                star.style.top = y + 'px';
                const angle = (i / 5) * Math.PI * 2;
                const dist = 35 + Math.random() * 30;
                star.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
                star.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
                document.body.appendChild(star);
                setTimeout(() => star.remove(), 800);
            }
        }

        function showResult() {
            const el = document.createElement('div');
            el.className = 'encourage';
            let msg = score >= 25 ? "超级高手!🏆" : score >= 15 ? "太厉害了!🌟" : score >= 8 ? "很不错!👍" : "再接再厉!💪";
            el.textContent = score + "分 - " + msg;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 2000);
        }

        holes.forEach(hole => {
            hole.addEventListener('click', whack);
            hole.addEventListener('touchstart', whack, { passive: true });
        });
    </script>
</body>
</html>
