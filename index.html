<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>打地鼠 - 手指训练游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow-x: hidden;
        }

        h1 {
            color: #fff;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            margin-bottom: 8px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            text-align: center;
            flex-shrink: 0;
        }

        .score-board {
            background: rgba(255,255,255,0.95);
            padding: 8px 20px;
            border-radius: 15px;
            font-size: clamp(1rem, 3.5vw, 1.6rem);
            margin-bottom: 8px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        .score-board span {
            color: #ff6b6b;
            font-weight: bold;
            font-size: clamp(1.3rem, 4vw, 2rem);
        }

        .game-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: clamp(6px, 2vw, 15px);
            background: rgba(255,255,255,0.9);
            padding: clamp(12px, 3vw, 25px);
            border-radius: 20px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            flex-shrink: 0;
        }

        .hole {
            aspect-ratio: 1;
            width: 100%;
            background: radial-gradient(ellipse at center, #4a2c2a 0%, #2d1810 100%);
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            border: clamp(4px, 1.2vw, 7px) solid #8b5a2b;
            box-shadow: inset 0 12px 20px rgba(0,0,0,0.5);
            transition: transform 0.1s;
            touch-action: manipulation;
        }

        .hole:active {
            transform: scale(0.95);
        }

        .mole {
            width: 80%;
            height: 80%;
            position: absolute;
            bottom: -100%;
            left: 10%;
            transition: bottom 0.2s ease-out;
            pointer-events: none;
        }

        .mole::before {
            content: "🐹";
            font-size: clamp(35px, 10vw, 70px);
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        .hole.up .mole {
            bottom: 5%;
        }

        .hit-effect {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: bold;
            color: #ffd700;
            text-shadow: 3px 3px 0 #ff6b6b, 6px 6px 0 rgba(0,0,0,0.3);
            animation: hitPop 0.5s ease-out;
            z-index: 100;
            pointer-events: none;
        }

        @keyframes hitPop {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(2);
                opacity: 0;
            }
        }

        .btn-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
            flex-shrink: 0;
        }

        .start-btn {
            padding: 12px 40px;
            font-size: clamp(1.1rem, 3.5vw, 1.6rem);
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(238,90,36,0.4);
            transition: all 0.3s;
            font-weight: bold;
            -webkit-tap-highlight-color: transparent;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(238,90,36,0.5);
        }

        .start-btn:active {
            transform: scale(0.95);
        }

        .start-btn:disabled {
            background: #999;
            cursor: not-allowed;
            transform: none;
        }

        .time-left {
            color: #fff;
            font-size: clamp(0.9rem, 2.5vw, 1.3rem);
            text-align: center;
        }

        /* 星星特效 */
        .star {
            position: fixed;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            pointer-events: none;
            animation: starFly 1s ease-out forwards;
            z-index: 99;
        }

        @keyframes starFly {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) rotate(360deg) scale(0);
                opacity: 0;
            }
        }

        /* 鼓励文字 */
        .encourage {
            position: fixed;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            font-weight: bold;
            color: #fff;
            text-shadow: 3px 3px 0 #ff6b6b;
            animation: encouragePop 1s ease-out forwards;
            z-index: 101;
            pointer-events: none;
            white-space: nowrap;
        }

        @keyframes encouragePop {
            0% {
                transform: translateX(-50%) scale(0);
                opacity: 0;
            }
            20% {
                transform: translateX(-50%) scale(1.3);
                opacity: 1;
            }
            80% {
                transform: translateX(-50%) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateX(-50%) translateY(-30px) scale(0.8);
                opacity: 0;
            }
        }

        /* 禁止选中文本 */
        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body>
    <h1>🎯 打地鼠</h1>
    
    <div class="score-board">
        得分: <span id="score">0</span>
    </div>

    <div class="game-container" id="gameBoard">
        <div class="hole" data-index="0"><div class="mole"></div></div>
        <div class="hole" data-index="1"><div class="mole"></div></div>
        <div class="hole" data-index="2"><div class="mole"></div></div>
        <div class="hole" data-index="3"><div class="mole"></div></div>
        <div class="hole" data-index="4"><div class="mole"></div></div>
        <div class="hole" data-index="5"><div class="mole"></div></div>
        <div class="hole" data-index="6"><div class="mole"></div></div>
        <div class="hole" data-index="7"><div class="mole"></div></div>
        <div class="hole" data-index="8"><div class="mole"></div></div>
    </div>

    <div class="btn-row">
        <button class="start-btn" id="startBtn" onclick="startGame()">开始</button>
        <div class="time-left" id="timeLeft"></div>
    </div>

    <script>
        // Web Audio API 生成音效
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // 生成地鼠出现音效
        function playPopSound() {
            try {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.15);
                
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.15);
            } catch(e) {}
        }
        
        // 生成击中音效
        function playHitSound() {
            try {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(400, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.2);
                
                gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.2);
                
                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc2.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
                gain2.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc2.start(audioCtx.currentTime);
                osc2.stop(audioCtx.currentTime + 0.1);
            } catch(e) {}
        }

        const holes = document.querySelectorAll('.hole');
        const scoreDisplay = document.getElementById('score');
        const startBtn = document.getElementById('startBtn');
        const timeLeftDisplay = document.getElementById('timeLeft');
        
        let score = 0;
        let lastHole;
        let timeUp = false;
        let gameTime = 30;
        let timer;

        const encourages = ["太棒了！🌟", "好样的！👍", "厉害！🎉", "真聪明！💪", "棒棒的！✨"];

        function randomTime(min, max) {
            return Math.round(Math.random() * (max - min) + min);
        }

        function randomHole(holes) {
            const idx = Math.floor(Math.random() * holes.length);
            const hole = holes[idx];
            if (hole === lastHole) return randomHole(holes);
            lastHole = hole;
            return hole;
        }

        function peep() {
            const time = randomTime(500, 1200);
            const hole = randomHole(holes);
            hole.classList.add('up');
            playPopSound();
            
            setTimeout(() => {
                hole.classList.remove('up');
                if (!timeUp) peep();
            }, time);
        }

        function startGame() {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            score = 0;
            timeUp = false;
            gameTime = 30;
            scoreDisplay.textContent = score;
            startBtn.disabled = true;
            startBtn.textContent = "游戏中";
            
            peep();
            
            timer = setInterval(() => {
                gameTime--;
                timeLeftDisplay.textContent = `${gameTime}秒`;
                if (gameTime <= 0) {
                    clearInterval(timer);
                    timeUp = true;
                    startBtn.disabled = false;
                    startBtn.textContent = "再来";
                    timeLeftDisplay.textContent = "结束!";
                    showResult();
                }
            }, 1000);
        }

        function whack(e) {
            if(!e.isTrusted) return;
            const hole = this;
            if (!hole.classList.contains('up')) return;
            
            playHitSound();
            score++;
            hole.classList.remove('up');
            scoreDisplay.textContent = score;
            
            let x, y;
            if (e.touches && e.touches.length > 0) {
                x = e.touches[0].clientX;
                y = e.touches[0].clientY;
            } else {
                x = e.clientX;
                y = e.clientY;
            }
            
            showHitEffect(x, y);
            showEncourage();
            createStars(x, y);
        }

        function showHitEffect(x, y) {
            const effect = document.createElement('div');
            effect.className = 'hit-effect';
            effect.textContent = '💥';
            effect.style.left = x + 'px';
            effect.style.top = y + 'px';
            document.body.appendChild(effect);
            setTimeout(() => effect.remove(), 500);
        }

        function showEncourage() {
            const encourage = document.createElement('div');
            encourage.className = 'encourage';
            encourage.textContent = encourages[Math.floor(Math.random() * encourages.length)];
            document.body.appendChild(encourage);
            setTimeout(() => encourage.remove(), 1000);
        }

        function createStars(x, y) {
            for (let i = 0; i < 6; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.textContent = '⭐';
                star.style.left = x + 'px';
                star.style.top = y + 'px';
                
                const angle = (i / 6) * Math.PI * 2;
                const distance = 40 + Math.random() * 40;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                star.style.setProperty('--tx', tx + 'px');
                star.style.setProperty('--ty', ty + 'px');
                
                document.body.appendChild(star);
                setTimeout(() => star.remove(), 1000);
            }
        }

        function showResult() {
            const result = document.createElement('div');
            result.className = 'encourage';
            let message;
            if (score >= 30) message = "超级高手！🏆";
            else if (score >= 20) message = "太厉害了！🌟";
            else if (score >= 10) message = "很不错！👍";
            else message = "再接再厉！💪";
            result.textContent = `${score}分 - ${message}`;
            document.body.appendChild(result);
            setTimeout(() => result.remove(), 2000);
        }

        holes.forEach(hole => {
            hole.addEventListener('click', whack);
            hole.addEventListener('touchstart', whack, { passive: true });
        });
    </script>
</body>
</html>
