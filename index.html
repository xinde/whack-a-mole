<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打地鼠 - 手指训练游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        h1 {
            color: #fff;
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
        }

        .score-board {
            background: rgba(255,255,255,0.95);
            padding: 20px 40px;
            border-radius: 20px;
            font-size: 2rem;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .score-board span {
            color: #ff6b6b;
            font-weight: bold;
            font-size: 2.5rem;
        }

        .game-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            background: rgba(255,255,255,0.9);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .hole {
            width: 150px;
            height: 150px;
            background: radial-gradient(ellipse at center, #4a2c2a 0%, #2d1810 100%);
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            border: 8px solid #8b5a2b;
            box-shadow: inset 0 15px 25px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }

        .hole:active {
            transform: scale(0.95);
        }

        .mole {
            width: 100px;
            height: 100px;
            position: absolute;
            bottom: -120px;
            left: 50%;
            transform: translateX(-50%);
            transition: bottom 0.2s ease-out;
            pointer-events: none;
        }

        .mole::before {
            content: "🐹";
            font-size: 80px;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        .hole.up .mole {
            bottom: 10px;
        }

        .hit-effect {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 4px 4px 0 #ff6b6b, 8px 8px 0 rgba(0,0,0,0.3);
            animation: hitPop 0.5s ease-out;
            z-index: 100;
            pointer-events: none;
        }

        @keyframes hitPop {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(2);
                opacity: 0;
            }
        }

        .start-btn {
            margin-top: 30px;
            padding: 20px 60px;
            font-size: 1.8rem;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(238,90,36,0.4);
            transition: all 0.3s;
            font-weight: bold;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(238,90,36,0.5);
        }

        .start-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .time-left {
            color: #fff;
            font-size: 1.5rem;
            margin-top: 15px;
        }

        /* 星星特效 */
        .star {
            position: fixed;
            font-size: 3rem;
            pointer-events: none;
            animation: starFly 1s ease-out forwards;
            z-index: 99;
        }

        @keyframes starFly {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) rotate(360deg) scale(0);
                opacity: 0;
            }
        }

        /* 鼓励文字 */
        .encourage {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 3px 3px 0 #ff6b6b;
            animation: encouragePop 1s ease-out forwards;
            z-index: 101;
            pointer-events: none;
        }

        @keyframes encouragePop {
            0% {
                transform: translateX(-50%) scale(0);
                opacity: 0;
            }
            20% {
                transform: translateX(-50%) scale(1.3);
                opacity: 1;
            }
            80% {
                transform: translateX(-50%) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateX(-50%) translateY(-30px) scale(0.8);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <h1>🎯 打地鼠游戏</h1>
    
    <div class="score-board">
        得分: <span id="score">0</span>
    </div>

    <div class="game-container" id="gameBoard">
        <div class="hole" data-index="0"><div class="mole"></div></div>
        <div class="hole" data-index="1"><div class="mole"></div></div>
        <div class="hole" data-index="2"><div class="mole"></div></div>
        <div class="hole" data-index="3"><div class="mole"></div></div>
        <div class="hole" data-index="4"><div class="mole"></div></div>
        <div class="hole" data-index="5"><div class="mole"></div></div>
        <div class="hole" data-index="6"><div class="mole"></div></div>
        <div class="hole" data-index="7"><div class="mole"></div></div>
        <div class="hole" data-index="8"><div class="mole"></div></div>
    </div>

    <button class="start-btn" id="startBtn" onclick="startGame()">开始游戏</button>
    
    <div class="time-left" id="timeLeft"></div>

    <script>
        const holes = document.querySelectorAll('.hole');
        const scoreDisplay = document.getElementById('score');
        const startBtn = document.getElementById('startBtn');
        const timeLeftDisplay = document.getElementById('timeLeft');
        
        let score = 0;
        let lastHole;
        let timeUp = false;
        let gameTime = 30; // 游戏时间30秒
        let timer;

        // 鼓励语录
        const encourages = [
            "太棒了！🌟",
            "好样的！👍",
            "厉害！🎉",
            "真聪明！💪",
            "棒棒的！✨",
            "满分！🏆",
            "超级棒！👏",
            "高手！🎯"
        ];

        function randomTime(min, max) {
            return Math.round(Math.random() * (max - min) + min);
        }

        function randomHole(holes) {
            const idx = Math.floor(Math.random() * holes.length);
            const hole = holes[idx];
            if (hole === lastHole) {
                return randomHole(holes);
            }
            lastHole = hole;
            return hole;
        }

        function peep() {
            const time = randomTime(500, 1200);
            const hole = randomHole(holes);
            hole.classList.add('up');
            
            setTimeout(() => {
                hole.classList.remove('up');
                if (!timeUp) peep();
            }, time);
        }

        function startGame() {
            score = 0;
            timeUp = false;
            gameTime = 30;
            scoreDisplay.textContent = score;
            startBtn.disabled = true;
            startBtn.textContent = "游戏中...";
            
            peep();
            
            // 倒计时
            timer = setInterval(() => {
                gameTime--;
                timeLeftDisplay.textContent = `剩余时间: ${gameTime} 秒`;
                if (gameTime <= 0) {
                    clearInterval(timer);
                    timeUp = true;
                    startBtn.disabled = false;
                    startBtn.textContent = "再来一局";
                    timeLeftDisplay.textContent = "游戏结束！";
                    showResult();
                }
            }, 1000);
        }

        function whack(e) {
            if(!e.isTrusted) return; // 防止脚本作弊
            
            const hole = this;
            if (!hole.classList.contains('up')) return;
            
            score++;
            hole.classList.remove('up');
            scoreDisplay.textContent = score;
            
            // 显示打击特效
            showHitEffect(e.clientX, e.clientY);
            
            // 显示鼓励语
            showEncourage();
            
            // 星星特效
            createStars(e.clientX, e.clientY);
        }

        function showHitEffect(x, y) {
            const effect = document.createElement('div');
            effect.className = 'hit-effect';
            effect.textContent = '💥';
            effect.style.left = x + 'px';
            effect.style.top = y + 'px';
            document.body.appendChild(effect);
            
            setTimeout(() => effect.remove(), 500);
        }

        function showEncourage() {
            const encourage = document.createElement('div');
            encourage.className = 'encourage';
            encourage.textContent = encourages[Math.floor(Math.random() * encourages.length)];
            document.body.appendChild(encourage);
            
            setTimeout(() => encourage.remove(), 1000);
        }

        function createStars(x, y) {
            for (let i = 0; i < 6; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.textContent = '⭐';
                star.style.left = x + 'px';
                star.style.top = y + 'px';
                
                // 随机方向
                const angle = (Math.PI * 2 / 6) * i;
                const distance = 100 + Math.random() * 50;
                star.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                star.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
                
                document.body.appendChild(star);
                
                setTimeout(() => star.remove(), 1000);
            }
        }

        function showResult() {
            let message;
            if (score >= 30) {
                message = "🎊 超级高手！太厉害了！";
            } else if (score >= 20) {
                message = "🌟 非常棒！继续加油！";
            } else if (score >= 10) {
                message = "👍 不错哦！再来一局？";
            } else {
                message = "💪 重在参与！锻炼手指更健康！";
            }
            
            const result = document.createElement('div');
            result.className = 'encourage';
            result.style.top = '70%';
            result.textContent = `最终得分: ${score} - ${message}`;
            document.body.appendChild(result);
            
            setTimeout(() => result.remove(), 3000);
        }

        // 绑定点击事件
        holes.forEach(hole => hole.addEventListener('click', whack));
        holes.forEach(hole => hole.addEventListener('touchstart', whack));
    </script>
</body>
</html>
