<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>打地鼠 - 手指训练游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            overflow-x: hidden;
        }

        h1 {
            color: #fff;
            font-size: clamp(1.8rem, 6vw, 3rem);
            margin-bottom: 15px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            text-align: center;
        }

        .score-board {
            background: rgba(255,255,255,0.95);
            padding: 15px 30px;
            border-radius: 20px;
            font-size: clamp(1.2rem, 4vw, 2rem);
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .score-board span {
            color: #ff6b6b;
            font-weight: bold;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
        }

        .game-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: clamp(8px, 3vw, 20px);
            background: rgba(255,255,255,0.9);
            padding: clamp(15px, 4vw, 30px);
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            max-width: 100%;
            width: fit-content;
        }

        .hole {
            width: clamp(70px, 22vw, 150px);
            height: clamp(70px, 22vw, 150px);
            background: radial-gradient(ellipse at center, #4a2c2a 0%, #2d1810 100%);
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            border: clamp(4px, 1.5vw, 8px) solid #8b5a2b;
            box-shadow: inset 0 15px 25px rgba(0,0,0,0.5);
            transition: transform 0.1s;
            touch-action: manipulation;
        }

        .hole:active {
            transform: scale(0.95);
        }

        .mole {
            width: clamp(50px, 15vw, 100px);
            height: clamp(50px, 15vw, 100px);
            position: absolute;
            bottom: -120px;
            left: 50%;
            transform: translateX(-50%);
            transition: bottom 0.2s ease-out;
            pointer-events: none;
        }

        .mole::before {
            content: "🐹";
            font-size: clamp(40px, 12vw, 80px);
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        .hole.up .mole {
            bottom: 10px;
        }

        .hit-effect {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(3rem, 10vw, 5rem);
            font-weight: bold;
            color: #ffd700;
            text-shadow: 4px 4px 0 #ff6b6b, 8px 8px 0 rgba(0,0,0,0.3);
            animation: hitPop 0.5s ease-out;
            z-index: 100;
            pointer-events: none;
        }

        @keyframes hitPop {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(2);
                opacity: 0;
            }
        }

        .start-btn {
            margin-top: 20px;
            padding: clamp(15px, 4vw, 20px) clamp(30px, 8vw, 60px);
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(238,90,36,0.4);
            transition: all 0.3s;
            font-weight: bold;
            -webkit-tap-highlight-color: transparent;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(238,90,36,0.5);
        }

        .start-btn:active {
            transform: scale(0.95);
        }

        .start-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .time-left {
            color: #fff;
            font-size: clamp(1rem, 3vw, 1.5rem);
            margin-top: 10px;
            text-align: center;
        }

        /* 星星特效 */
        .star {
            position: fixed;
            font-size: clamp(2rem, 6vw, 3rem);
            pointer-events: none;
            animation: starFly 1s ease-out forwards;
            z-index: 99;
        }

        @keyframes starFly {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) rotate(360deg) scale(0);
                opacity: 0;
            }
        }

        /* 鼓励文字 */
        .encourage {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(2rem, 6vw, 3rem);
            font-weight: bold;
            color: #fff;
            text-shadow: 3px 3px 0 #ff6b6b;
            animation: encouragePop 1s ease-out forwards;
            z-index: 101;
            pointer-events: none;
            white-space: nowrap;
        }

        @keyframes encouragePop {
            0% {
                transform: translateX(-50%) scale(0);
                opacity: 0;
            }
            20% {
                transform: translateX(-50%) scale(1.3);
                opacity: 1;
            }
            80% {
                transform: translateX(-50%) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateX(-50%) translateY(-30px) scale(0.8);
                opacity: 0;
            }
        }

        /* 移动端优化 */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            .game-container {
                gap: 8px;
                padding: 15px;
            }
            
            .hole {
                width: 70px;
                height: 70px;
            }
            
            .mole {
                width: 50px;
                height: 50px;
            }
            
            .mole::before {
                font-size: 40px;
            }
        }

        /* 禁止选中文本 */
        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body>
    <h1>🎯 打地鼠游戏</h1>
    
    <div class="score-board">
        得分: <span id="score">0</span>
    </div>

    <div class="game-container" id="gameBoard">
        <div class="hole" data-index="0"><div class="mole"></div></div>
        <div class="hole" data-index="1"><div class="mole"></div></div>
        <div class="hole" data-index="2"><div class="mole"></div></div>
        <div class="hole" data-index="3"><div class="mole"></div></div>
        <div class="hole" data-index="4"><div class="mole"></div></div>
        <div class="hole" data-index="5"><div class="mole"></div></div>
        <div class="hole" data-index="6"><div class="mole"></div></div>
        <div class="hole" data-index="7"><div class="mole"></div></div>
        <div class="hole" data-index="8"><div class="mole"></div></div>
    </div>

    <button class="start-btn" id="startBtn" onclick="startGame()">开始游戏</button>
    
    <div class="time-left" id="timeLeft"></div>

    <!-- 音效元素 -->
    <audio id="popSound" src="data:audio/wav;base64,UklGRl9vT1BXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU" preload="auto"></audio>
    <audio id="hitSound" src="data:audio/wav;base64,UklGRl9vT1BXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU" preload="auto"></audio>

    <script>
        // Web Audio API 生成音效
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // 生成地鼠出现音效（短的"砰"声）
        function playPopSound() {
            try {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.15);
                
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.15);
            } catch(e) {
                console.log('Audio error:', e);
            }
        }
        
        // 生成击中音效（更响亮的打击声）
        function playHitSound() {
            try {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(400, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.2);
                
                gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.2);
                
                // 添加第二层音效
                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc2.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
                gain2.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc2.start(audioCtx.currentTime);
                osc2.stop(audioCtx.currentTime + 0.1);
            } catch(e) {
                console.log('Audio error:', e);
            }
        }

        const holes = document.querySelectorAll('.hole');
        const scoreDisplay = document.getElementById('score');
        const startBtn = document.getElementById('startBtn');
        const timeLeftDisplay = document.getElementById('timeLeft');
        
        let score = 0;
        let lastHole;
        let timeUp = false;
        let gameTime = 30;
        let timer;

        // 鼓励语录
        const encourages = [
            "太棒了！🌟",
            "好样的！👍",
            "厉害！🎉",
            "真聪明！💪",
            "棒棒的！✨",
            "满分！🏆",
            "超级棒！👏",
            "高手！🎯"
        ];

        function randomTime(min, max) {
            return Math.round(Math.random() * (max - min) + min);
        }

        function randomHole(holes) {
            const idx = Math.floor(Math.random() * holes.length);
            const hole = holes[idx];
            if (hole === lastHole) {
                return randomHole(holes);
            }
            lastHole = hole;
            return hole;
        }

        function peep() {
            const time = randomTime(500, 1200);
            const hole = randomHole(holes);
            hole.classList.add('up');
            
            // 播放出现音效
            playPopSound();
            
            setTimeout(() => {
                hole.classList.remove('up');
                if (!timeUp) peep();
            }, time);
        }

        function startGame() {
            // 激活音频上下文（移动端需要用户交互）
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            score = 0;
            timeUp = false;
            gameTime = 30;
            scoreDisplay.textContent = score;
            startBtn.disabled = true;
            startBtn.textContent = "游戏中...";
            
            peep();
            
            // 倒计时
            timer = setInterval(() => {
                gameTime--;
                timeLeftDisplay.textContent = `剩余时间: ${gameTime} 秒`;
                if (gameTime <= 0) {
                    clearInterval(timer);
                    timeUp = true;
                    startBtn.disabled = false;
                    startBtn.textContent = "再来一局";
                    timeLeftDisplay.textContent = "游戏结束！";
                    showResult();
                }
            }, 1000);
        }

        function whack(e) {
            if(!e.isTrusted) return;
            
            const hole = this;
            if (!hole.classList.contains('up')) return;
            
            // 播放击中音效
            playHitSound();
            
            score++;
            hole.classList.remove('up');
            scoreDisplay.textContent = score;
            
            // 获取点击坐标
            let x, y;
            if (e.touches && e.touches.length > 0) {
                x = e.touches[0].clientX;
                y = e.touches[0].clientY;
            } else {
                x = e.clientX;
                y = e.clientY;
            }
            
            // 显示打击特效
            showHitEffect(x, y);
            
            // 显示鼓励语
            showEncourage();
            
            // 星星特效
            createStars(x, y);
        }

        function showHitEffect(x, y) {
            const effect = document.createElement('div');
            effect.className = 'hit-effect';
            effect.textContent = '💥';
            effect.style.left = x + 'px';
            effect.style.top = y + 'px';
            document.body.appendChild(effect);
            
            setTimeout(() => effect.remove(), 500);
        }

        function showEncourage() {
            const encourage = document.createElement('div');
            encourage.className = 'encourage';
            encourage.textContent = encourages[Math.floor(Math.random() * encourages.length)];
            document.body.appendChild(encourage);
            
            setTimeout(() => encourage.remove(), 1000);
        }

        function createStars(x, y) {
            for (let i = 0; i < 6; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.textContent = '⭐';
                star.style.left = x + 'px';
                star.style.top = y + 'px';
                
                const angle = (i / 6) * Math.PI * 2;
                const distance = 50 + Math.random() * 50;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                star.style.setProperty('--tx', tx + 'px');
                star.style.setProperty('--ty', ty + 'px');
                
                document.body.appendChild(star);
                
                setTimeout(() => star.remove(), 1000);
            }
        }

        function showResult() {
            const result = document.createElement('div');
            result.className = 'encourage';
            let message;
            if (score >= 30) {
                message = "超级高手！🏆";
            } else if (score >= 20) {
                message = "太厉害了！🌟";
            } else if (score >= 10) {
                message = "很不错！👍";
            } else {
                message = "再接再厉！💪";
            }
            result.textContent = `得分: ${score} - ${message}`;
            document.body.appendChild(result);
            
            setTimeout(() => result.remove(), 2000);
        }

        // 绑定点击事件
        holes.forEach(hole => {
            hole.addEventListener('click', whack);
            hole.addEventListener('touchstart', whack, { passive: true });
        });
    </script>
</body>
</html>
